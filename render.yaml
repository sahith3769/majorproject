services:
  # 1. Main Application (Node.js + React Frontend)
  - type: web
    name: smart-placement-api
    env: node
    plan: free
    # Build Command: Install client deps, build client, install server deps
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    # Start Command: Run the Express server
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAILERSEND_API_KEY
        sync: false
      - key: MAILERSEND_FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: smart-placement-ml
          property: host

  # 2. ML Service (Python Flask)
  - type: web
    name: smart-placement-ml
    env: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app:app -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000
